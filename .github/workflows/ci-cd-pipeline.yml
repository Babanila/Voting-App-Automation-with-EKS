name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build.yml

  push:
    needs: build
    uses: ./.github/workflows/push-image.yml
    secrets: inherit

  deploy:
    needs: push
    uses: ./.github/workflows/deploy-eks.yml
    secrets: inherit
