apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: babs-app
  labels:
    app: worker
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: worker
        tier: backend
    spec:
      containers:
        - name: worker
          image: babanila/worker:3.0
          imagePullPolicy: Always
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: DB_HOST
              value: "db"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_NAME
              value: "postgres"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
